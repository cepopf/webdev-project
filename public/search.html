<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Search Products | Belle Bear</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary-blue: #CAEEFF;
            --color-highlight-yellow: #fff7dc;
            --color-text: #333;
            --color-bg-light: #fcfcfc;
            --shadow-light: 0 2px 8px rgba(0,0,0,0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--color-bg-light);
        }

        /* ===== HEADER ===== */
        header {
            background: #fff;
            padding: 10px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d6f0fb;
            position: sticky;
            top: 0;
            z-index: 100;

        }

        .search-bar {
            display: flex;
            align-items: center;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 6px 14px;
            gap: 6px;
            border: 1.5px solid #e0e0e0;
                
            text-decoration: none;
            color: inherit;
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            width: 140px;
        }

        .logo {
            font-family: 'Pacifico', cursive;
            font-size: 22px;
            color: #5bbde4;

            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .header-icons {
            display: flex;
            gap: 16px;
        }

        .header-icons svg {
            width: 22px;
            height: 22px;
            color: #8b5c3e;
            cursor: pointer;
        }

        .header-icons i {
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .header-icons i:hover {
            transform: scale(1.15);
        }



        /* ===== NAV ===== */
        nav {
            background: #d6f0fb;
            display: flex;
            justify-content: center;
            gap: 36px;
            padding: 10px 0;
        }

        nav a {
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            color: #8b5c3e;
            display: flex;
            gap: 4px;
            align-items: center;
        }

        nav a:hover {
            color: #e87fb5;
        }

        /* ===== SEARCH BOX ===== */
        .search-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .search-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow-light);
        }

        .search-section__title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .search-criteria {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group input,
        .form-group select {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #ccc;
            background: #fff7dc;
        }

        .price-range {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-search {
            background: var(--color-primary-blue);
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
        }

        .btn-clear {
            background: #eee;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 2rem;
        }

        /* 🔥 RESULT GRID (3 per row) */
        #results {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 👈 บังคับ 3 ช่อง */
            gap: 20px;
            margin-top: 20px;
        }

        /* 🔥 CARD */
        .product-card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            background: #fff;
            transition: 0.2s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        /* 🔥 MOCK IMAGE */
        .product-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
            background: #eee;
        }

        /* 🔥 SMALLER TEXT */
        .product-card h4 {
            font-size: 13px;
            margin: 8px 0 4px;
        }

        .product-card p {
            font-size: 12px;
            margin: 0;
            color: #555;
        }

        .no-result {
            grid-column: 1 / -1;   /* 👈 ให้กินเต็มแถว grid */
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
    <a href="search.html" class="search-bar">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search" readonly>
    </a>

    <div class="logo">Belle Bear</div>

    <div class="header-icons">
        <i class="bi bi-bag"></i>
        <i class="bi bi-person"></i>
    </div>
</header>

<!-- ===== NAV ===== -->
<nav>
    <a href="#">RECOMMEND <i class="bi bi-caret-down-fill"></i></a>
    <a href="#">TYPE <i class="bi bi-caret-down-fill"></i></a>
    <a href="#">ABOUT US <i class="bi bi-caret-down-fill"></i></a>
</nav>

<!-- ===== SEARCH ===== -->
<main class="search-container">
    <section class="search-section">
        <h2 class="search-section__title">🔍 Search Products</h2>

        <form>
            <div class="search-criteria">

                <div class="form-group">
                    <label>Doll Name</label>
                    <input type="text" id="nameInput" placeholder="e.g., Hello Kitty">
                </div>

                <div class="form-group">
                    <label>Brand</label>
                    <select id="brandSelect">
                        <option value="">All Brands</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Price Range</label>
                    <div class="price-range">
                        <input type="number" placeholder="Min">
                        <span>-</span>
                        <input type="number" placeholder="Max">
                    </div>
                </div>

            </div>

            <div class="search-actions">
                <button type="button" class="btn-search">
                    <i class="bi bi-search"></i> Search
                </button>

                <button type="reset" class="btn-clear">
                    Clear
                </button>
            </div>
        </form>
        <div id="results" class="mt-4"></div>
    </section>
</main>

<footer>
    © 2026 Belle Bear
</footer>

<script>
async function loadBrands() {
    const res = await fetch('http://localhost:3000/brands');
    const data = await res.json();

    const select = document.getElementById('brandSelect');

    data.forEach(item => {
        const option = document.createElement('option');
        option.value = item.Brand;
        option.textContent = item.Brand;
        select.appendChild(option);
    });
}

loadBrands();

document.querySelector('.btn-search').addEventListener('click', async () => {

    const name = document.getElementById('nameInput').value.trim();
    const brand = document.getElementById('brandSelect').value;
    const min = document.querySelectorAll('input[type="number"]')[0].value || 0;
    const max = document.querySelectorAll('input[type="number"]')[1].value || 999999;

    const res = await fetch(`http://localhost:3000/search?name=${name}&brand=${brand}&min=${min}&max=${max}`);
    const data = await res.json();

    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = '';

    // ❌ ไม่เจอ
    if (data.length === 0) {
        resultsDiv.innerHTML = `
        <div class="no-result">
            ❌ No result found
        </div>
        `;
        return;
    }

    // ✅ เจอ
    data.forEach(item => {
        resultsDiv.innerHTML += `
        <div class="product-card">
            <img src="https://via.placeholder.com/200x140">
            <h4>${item.Name}</h4>
            <p>${item.Brand}</p>
            <p>${item.Price} บาท</p>
        </div>
        `;
    });

});

// 🔥 clear
document.querySelector('.btn-clear').addEventListener('click', () => {
    document.getElementById('results').innerHTML = '';
});
</script>

</body>
</html>
