<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Search Products | Sanrio</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --color-primary-blue: #CAEEFF;
            --color-highlight-yellow: #fff7dc;
            --color-hover-gray: #a6a6a6;
            --color-text: #333333;
            --color-border: #cccccc;
            --color-bg-light: #fcfcfc;
            --color-white: #ffffff;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --shadow-light: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-medium: 0 4px 16px rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            color: var(--color-text);
            background-color: var(--color-bg-light);
        }

        .top-nav {
            background-color: var(--color-white);
            padding: 12px 0;
            box-shadow: var(--shadow-light);
        }

        .nav-list {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 2.5rem;
        }

        .nav-list__link {
            text-decoration: none;
            color: var(--color-text);
            font-weight: 600;
        }

        .nav-list__link:hover {
            color: var(--color-primary-blue);
        }

        .site-header {
            background-color: var(--color-primary-blue);
            padding: 2rem 0;
            text-align: center;
        }

        .site-header__logo {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .search-container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .search-section {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow-light);
        }

        .search-section__title {
            text-align: center;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .search-criteria {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group__input,
        .form-group__select {
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #ccc;
            background: #fff7dc;
        }

        .price-range-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }

        .btn-search,
        .btn-clear {
            padding: 10px 30px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
        }

        .btn-search {
            background: var(--color-primary-blue);
        }

        .btn-clear {
            background: #eee;
        }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }
    </style>
</head>



<body>

    <nav class="top-nav">
        <ul class="nav-list">
            <li><a href="#" class="nav-list__link">HOME</a></li>
            <li><a href="#" class="nav-list__link">SEARCH</a></li>
            <li><a href="#" class="nav-list__link">ABOUT US</a></li>
            <li><a href="#" class="nav-list__link">LOGIN</a></li>
        </ul>
    </nav>

    <header class="site-header">
        <h1 class="site-header__logo">Belle Bear</h1>
        <p>Find Your Perfect Plush</p>
    </header>

    <main class="search-container">
        <section class="search-section">
            <h2 class="search-section__title">🔍 Search Products</h2>

            <!-- ❗ ไม่มี id แล้ว -->
            <form class="search-form">

                <div class="search-criteria">

                    <div class="form-group">
                        <label>Doll Name</label>
                        <input type="text" class="form-group__input" placeholder="e.g., Hello Kitty">
                    </div>

                    <div class="form-group">
                        <label>Brand</label>
                        <select class="form-group__select">
                            <option>All Brands</option>
                            <option>Sanrio</option>
                            <option>Bandai</option>
                            <option>Disney</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Price Range</label>
                        <div class="price-range-inputs">
                            <input type="number" class="form-group__input" placeholder="Min">
                            <span>-</span>
                            <input type="number" class="form-group__input" placeholder="Max">
                        </div>
                    </div>

                </div>


                <div class="search-actions">
                    <button type="button" class="btn-search">
                        <i class="bi bi-search"></i> Search
                    </button>

                    <button type="reset" class="btn-clear">
                        Clear
                    </button>
                </div>

            </form>
        </section>
    </main>

    <footer>
        <p>© 2026 Sanrio Store</p>
    </footer>

</body>

</html>
