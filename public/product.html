<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Product Page</title>
  <style>
    :root {
      --bg: #efefef;
      --panel: #c7e5f5;
      --card: #efe9d6;
      --line: #2f2f2f;
      --text: #5b5555;
      --danger: #f0dcd8;
      --edit: #cfdcf3;
    }

    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: #1c1c1c;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      padding: 22px 24px;
    }

    .window-title,
    .browser-top {
      display: none;
    }

    .browser,
    .page {
      background: transparent;
      border: none;
      box-shadow: none;
      padding: 0;
      width: 100%;
    }

    .toolbar {
      background: var(--panel);
      border-radius: 24px;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      min-height: 88px;
    }

    .top-actions,
    .form-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .action-row {
      margin-top: 28px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      padding-left: 6px;
    }

    .btn {
      border: 2px solid var(--line);
      background: #edf4f8;
      color: #564f4f;
      border-radius: 24px;
      padding: 9px 18px;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      font-family: inherit;
    }

    .btn.small {
      min-width: 96px;
      height: 50px;
      font-size: 16px;
      padding: 8px 16px;
    }

    .btn.primary {
      background: #edf4f8
    }

    .btn.danger {
      background: var(--danger)
    }

    .btn.edit {
      background: var(--edit);
      min-width: 104px;
      height: 40px;
      font-size: 16px;
      padding: 6px 16px;
      border-radius: 20px;
    }

    .btn.add {
      background: var(--card);
      min-width: 360px;
      min-height: 94px;
      font-size: 24px;
      justify-content: flex-start;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 18px;
      text-align: left;
    }

    .brand-badge {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      background: linear-gradient(180deg, #f6efe7, #efe6da);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #b48e8e;
      font-size: 11px;
      line-height: 1.05;
      flex: 0 0 auto;
      overflow:hidden;
    }

    .brand-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius:18px;
    }

    .brand-badge .bear {
      font-size: 24px
    }

    .search {
      width: 100%;
      max-width: 420px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #edf4f8;
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 10px 16px;
      height: 54px;
    }

    .search input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 18px;
      color: var(--text);
      font-family: inherit;
    }

    .panel {
      background: var(--panel);
      border-radius: 24px;
      padding: 20px 26px;
      width: 100%;
    }

    .table-head {
      display: grid;
      grid-template-columns: 2.5fr 1fr 1fr 150px;
      gap: 12px;
      text-align: center;
      font-size: 16px;
      padding: 6px 14px 14px;
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 20px;
    }

    .product-row {
      display: grid;
      grid-template-columns: 2.5fr 1fr 1fr 150px;
      gap: 12px;
      align-items: center;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 20px;
      padding: 16px 18px;
      min-height: 92px;
      text-align: center;
      font-size: 18px;
    }

    .product-row.empty {
      color: #999
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1.06fr;
      gap: 26px;
      align-items: start;
    }

    .image-box {
      width: 100%;
      height: 540px;
      background: #ffffff;
      border: 2px solid var(--line);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .image-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .image-box.has-image img {
      display: block
    }

    .image-box.has-image .placeholder {
      display: none
    }

    .placeholder {
      font-size: 74px;
      opacity: .75;
    }

    .upload-input {
      display: none
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .input,
    .textarea {
      width: 100%;
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 22px;
      padding: 16px 20px;
      font-size: 17px;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }

    .input {
      height: 74px;
    }

    .textarea {
      min-height: 74px;
      height: 74px;
      resize: none;
      overflow: hidden;
    }

    .hidden {
      display: none !important
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .2);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }

    .modal {
      width: min(700px, 100%);
      background: #eceaea;
      border-radius: 16px;
      padding: 28px 24px 34px;
      text-align: center;
    }

    .modal-head {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }

    .modal-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }

    .modal-dot.red {
      background: #ff6e61
    }

    .modal-dot.yellow {
      background: #f5b333
    }

    .modal-dot.green {
      background: #2fbf46
    }

    .modal p {
      margin: 10px 0 34px;
      font-size: 24px;
      font-weight: 700;
      color: #4f4747;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr
      }

      .image-box {
        height: 340px
      }

      .btn.add {
        min-width: 100%;
        width: 100%
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 14px
      }

      .toolbar {
        padding: 14px 16px;
        min-height: auto
      }

      .table-head {
        display: none
      }

      .product-row {
        grid-template-columns: 1fr;
        text-align: left
      }

      .product-row>div:last-child {
        justify-self: start
      }

      .search {
        max-width: none
      }

      .top-actions {
        gap: 10px
      }

      .btn.small {
        min-width: 90px
      }

      .input {
        height: 62px
      }

      .textarea {
        min-height: 62px;
        height: 62px;
      }

      .image-box {
        height: 280px
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="window-title" id="pageTitle">Admin Page</div>

    <div class="browser">
      <div class="browser-top"></div>
      <div class="page">
        <!-- list (product list) -->
        <section id="view-list">
          <div class="toolbar">
            <label class="search">
              <span>🔎</span>
              <input id="searchInput" type="text" placeholder="Search for product" />
            </label>
            <div class="top-actions">
              <button class="btn small" id="btnLog">🪪 Log</button>
              <button class="btn small" id="btnLogout1">⊖ Logout</button>
            </div>
          </div>

          <div class="panel">
            <div class="table-head">
              <div>Product Name</div>
              <div>Product ID</div>
              <div>Price</div>
              <div></div>
            </div>
            <div class="rows" id="productRows"></div>
            <button class="btn add" id="goAdd">
              <span class="brand-badge">
                <img src="logo.jpg" class="add-icon">
              </span>
              <span>Add new product</span>
            </button>
          </div>
        </section>

        <!-- form (add/edit) -->
        <section id="view-form" class="hidden">
          <div class="toolbar">
            <div></div>
            <div class="top-actions">
              <button class="btn small" id="backToList">⏪ Back</button>
              <button class="btn small" id="btnLogout2">⊖ Logout</button>
            </div>
          </div>

          <div class="panel">
            <div class="layout">
              <div>
                <label class="image-box" for="imageUpload" id="imageLabel">
                  <div class="placeholder">🖼️</div>
                  <img id="previewImage" alt="Preview image" />
                </label>
                <input class="upload-input" id="imageUpload" type="file" accept="image/*" />

                <div class="action-row">
                  <button class="btn danger" id="deleteBtn">Delete</button>
                  <button class="btn" id="cancelBtn">Cancel</button>
                  <button class="btn primary" id="submitBtn">Update</button>
                </div>
              </div>

              <div class="fields">
                <input class="input" id="productName" type="text" placeholder="Product Name:" />
                <input class="input" id="productPrice" type="number" min="0" step="0.01" placeholder="Price:" />
                <input class="input" id="productQty" type="number" min="0" step="1" placeholder="Quantity:" />
                <input class="input" id="productBrand" type="text" placeholder="Brand:" />
                <textarea class="textarea" id="productDesc" placeholder="Description:"></textarea>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- popup delete product -->
  <div id="deleteModal" class="modal-backdrop hidden">
    <div class="modal">
      <div class="modal-head">
        <span class="modal-dot red"></span>
        <span class="modal-dot yellow"></span>
        <span class="modal-dot green"></span>
      </div>
      <p>Make sure you want to delete this product !!</p>
      <div class="form-actions" style="justify-content:center; gap:28px;">
        <button class="btn" id="cancelDelete">Cancel</button>
        <button class="btn danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const pageTitle = document.getElementById('pageTitle');
    const viewList = document.getElementById('view-list');
    const viewForm = document.getElementById('view-form');
    const productRows = document.getElementById('productRows'); // ดึง element จาก HTML มาใช้
    const searchInput = document.getElementById('searchInput');
    const goAdd = document.getElementById('goAdd');
    const backToList = document.getElementById('backToList');
    const cancelBtn = document.getElementById('cancelBtn');
    const submitBtn = document.getElementById('submitBtn');
    const deleteBtn = document.getElementById('deleteBtn');
    const deleteModal = document.getElementById('deleteModal');
    const cancelDelete = document.getElementById('cancelDelete');
    const confirmDelete = document.getElementById('confirmDelete');
    const imageUpload = document.getElementById('imageUpload');
    const previewImage = document.getElementById('previewImage');
    const imageLabel = document.getElementById('imageLabel');
    const textarea = document.getElementById('productDesc');

    const formEls = {
      name: document.getElementById('productName'),
      price: document.getElementById('productPrice'),
      qty: document.getElementById('productQty'),
      brand: document.getElementById('productBrand'),
      desc: textarea
    };

    // product list
    let products = [
      {
        id: 'MC001',
        name: 'Monchhichi Plush Bebichhichi',
        price: 495.00,
        quantity: 130,
        brand: 'Monchhichi',
        description: 'A cute and collectible Bebichhichi plush doll from the Monchhichi series. Made with soft, high-quality materials, featuring the iconic thumb-sucking pose and adorable outfit. Perfect for kids, collectors, or as a gift.',
        image: 'MC001.jpg'
      },
      {
        id: 'MC002',
        name: 'Hello Kitty X Monchhichi Part 2',
        price: 650.00,
        quantity: 146,
        brand: 'Monchhichi',
        description: 'Monchhichi Sweet Sugar plush doll featuring soft pastel colors and a cute sweet-themed outfit. Made with high-quality materials and the iconic thumb-sucking pose, perfect for collectors and gift giving.',
        image: 'MC002.jpg'
      },
      {
        id: 'MC003',
        name: 'Monchhichi Sweet Sugar Plush Doll',
        price: '90.00',
        quantity: '92',
        brand: 'Monchhichi',
        description: 'Classic Monchhichi Sweeet Brown plush doll featuring soft brown fur and the iconic thumb-sucking pose. A timeless collectible toy from Japan, perfect for kids and collectors.',
        image: 'MC003.jpg'
      },
      {
        id: 'MC004',
        name: 'Usahana x Rody Collaboration Plush',
        price: 750.00,
        quantity: 16,
        brand: 'Sanrio x Rody',
        description: 'Adorable collaboration plush featuring Usahana with the iconic Rody horse design in soft pastel colors. Perfect for collectors and fans of cute Japanese characters.',
        image: 'MC004.jpg'
      }
    ];

    let currentMode = 'list';
    let editIndex = null;
    let currentImage = '';

    // Auto resize textarea
    function autoResizeTextarea() {
      const baseHeight = window.innerWidth <= 720 ? 62 : 74;
      textarea.style.height = baseHeight + 'px';
      textarea.style.height = Math.max(textarea.scrollHeight, baseHeight) + 'px';
    }

    // List ↔ Form
    function showView(mode) {
      currentMode = mode;
      if (mode === 'list') {
        viewList.classList.remove('hidden');
        viewForm.classList.add('hidden');
        pageTitle.textContent = 'Admin Page';
        renderProducts();
        return;
      }

      viewList.classList.add('hidden');
      viewForm.classList.remove('hidden');

      if (mode === 'add') {
        pageTitle.textContent = 'Admin Add';
        submitBtn.textContent = 'Add';
        deleteBtn.classList.add('hidden');
        setTimeout(autoResizeTextarea, 0);
      }

      if (mode === 'edit') {
        pageTitle.textContent = 'Admin Edit';
        submitBtn.textContent = 'Update';
        deleteBtn.classList.remove('hidden');
        setTimeout(autoResizeTextarea, 0);
      }
    }

    // แสดงสินค้า
    function renderProducts() {
      const keyword = searchInput.value.trim().toLowerCase();
      const filtered = products.filter(p => {
        return [p.name, p.id, p.brand].some(v => String(v).toLowerCase().includes(keyword));
      });

      productRows.innerHTML = '';

      filtered.forEach((product) => {
        const originalIndex = products.findIndex(p => p.id === product.id);
        const row = document.createElement('div');
        row.className = 'product-row' + (!product.name ? ' empty' : '');
        row.innerHTML = `
          <div>${product.name || '&nbsp;'}</div>
          <div>${product.name ? product.id : '&nbsp;'}</div>
          <div>${product.name ? Number(product.price).toFixed(2) : '&nbsp;'}</div>
          <div><button class="btn edit">Edit ✎</button></div>
        `;
        row.querySelector('button').addEventListener('click', () => openEdit(originalIndex));
        productRows.appendChild(row);
      });
    }

    function resetForm() {
      formEls.name.value = '';
      formEls.price.value = '';
      formEls.qty.value = '';
      formEls.brand.value = '';
      formEls.desc.value = '';
      currentImage = '';
      previewImage.src = '';
      imageLabel.classList.remove('has-image');
      imageUpload.value = '';
      autoResizeTextarea();
    }

    function fillForm(product) {
      formEls.name.value = product.name || '';
      formEls.price.value = product.price ?? '';
      formEls.qty.value = product.quantity ?? '';
      formEls.brand.value = product.brand || '';
      formEls.desc.value = product.description || '';
      currentImage = product.image || '';
      if (currentImage) {
        previewImage.src = currentImage;
        imageLabel.classList.add('has-image');
      } else {
        previewImage.src = '';
        imageLabel.classList.remove('has-image');
      }
      autoResizeTextarea();
    }

    function openAdd() {
      editIndex = null;
      resetForm();
      showView('add');
    }

    function openEdit(index) {
      editIndex = index;
      fillForm(products[index]);
      showView('edit');
    }

    // สร้าง ID อัตโนมัติ
    function generateId() {
      const next = products.length + 1;
      return 'MC' + String(next).padStart(3, '0');
    }

    // ค่าจาก input → สร้าง object
    function getFormData() {
      return {
        id: editIndex === null ? generateId() : products[editIndex].id,
        name: formEls.name.value.trim(),
        price: parseFloat(formEls.price.value || '0'),
        quantity: parseInt(formEls.qty.value || '0', 10),
        brand: formEls.brand.value.trim(),
        description: formEls.desc.value.trim(),
        image: currentImage
      };
    }

    // ตรวจสอบข้อมูล
    function validateForm(data) {
      if (!data.name) {
        alert('Please enter a product name.');
        return false;
      }
      if (Number.isNaN(data.price)) {
        alert('Please enter a valid price.');
        return false;
      }
      if (Number.isNaN(data.quantity)) {
        alert('Please enter a valid quantity.');
        return false;
      }
      return true;
    }

    goAdd.addEventListener('click', openAdd);
    backToList.addEventListener('click', () => showView('list'));
    cancelBtn.addEventListener('click', () => showView('list'));
    searchInput.addEventListener('input', renderProducts);

    textarea.addEventListener('input', autoResizeTextarea);
    window.addEventListener('resize', autoResizeTextarea);

    submitBtn.addEventListener('click', () => { // เพิ่มสินค้า mode = add
      const data = getFormData();
      if (!validateForm(data)) return;

      if (currentMode === 'add') {
        products.push(data);
      } else if (currentMode === 'edit' && editIndex !== null) {
        products[editIndex] = data; // แก้ไขสินค้า
      }

      showView('list');
    });

    deleteBtn.addEventListener('click', () => {
      deleteModal.classList.remove('hidden');
      pageTitle.textContent = 'Admin Edit Delete';
    });

    cancelDelete.addEventListener('click', () => {
      deleteModal.classList.add('hidden');
      pageTitle.textContent = 'Admin Edit';
    });

    confirmDelete.addEventListener('click', () => {
      if (editIndex !== null) {
        products.splice(editIndex, 1); // ลบสินค้าออกจาก array
      }
      deleteModal.classList.add('hidden');
      showView('list');
    });

    deleteModal.addEventListener('click', (e) => {
      if (e.target === deleteModal) {
        deleteModal.classList.add('hidden');
        pageTitle.textContent = 'Admin Edit';
      }
    });

    imageUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader(); // อัปโหลดรูป
      reader.onload = () => {
        currentImage = reader.result;
        previewImage.src = currentImage;
        imageLabel.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    });

    document.getElementById('btnLog').addEventListener('click', () => alert('Log button example'));
    document.getElementById('btnLogout1').addEventListener('click', () => alert('Logout'));
    document.getElementById('btnLogout2').addEventListener('click', () => alert('Logout'));

    renderProducts();
    autoResizeTextarea();
  </script>
</body>

</html>
