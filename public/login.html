<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .logo {
            max-width: 450px;
        }

        .input-custom {
            background: #fff7dc;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 10px;
        }

        .btn-custom {
            background: #CAEEFF;
            border: none;
            width: 200px;
        }

        .btn-custom:hover {
            background: #a6a6a6;
        }

        .divider {
            border-left: 2px solid #333;
            height: 400px;
        }
    </style>
</head>

<body>

    <main class="container vh-100 d-flex align-items-center">
        <section class="row w-100 align-items-center">
            <div class="col-md-6 text-center">
                <figure>
                    <img src="logo.jpg" class="img-fluid logo rounded" alt="Company logo">
                </figure>
            </div>
            <div class="col-md-1 d-none d-md-flex justify-content-center" aria-hidden="true">
                <div class="divider"></div>
            </div>
            <section class="col-md-5">
                <header>
                    <h1 class="mb-4 text-center">Welcome Back</h1>
                </header>
                <form action="/login" method="POST">
                    <fieldset>
                        <legend class="visually-hidden">Login Form</legend>

                        <div class="mb-3">
                            <input id="username" name="username" required placeholder="Enter your username">
                            <input id="password" name="password" required placeholder="Enter your password">
                                
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fs-4">Password</label>
                            <input id="password" type="password" name="password"
                                class="form-control input-custom"
                                placeholder="Enter your password">
                        </div>
                    </fieldset>
                    <nav class="d-flex flex-column gap-2 align-items-center">
                        <button class="btn btn-custom" type="submit">Login</button>
                        <button class="btn btn-custom" type="button"onclick="window.location.href='/'">Back</button>
                    </nav>
                </form>
            </section>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
